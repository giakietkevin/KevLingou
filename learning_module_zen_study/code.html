<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .washi-card {
      background-color: #e1dfda; /* secondary-container / Washi */
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .washi-card:hover {
      box-shadow: 0px 4px 20px rgba(0,0,0,0.04);
    }
    .progress-track {
      background-color: #e4e2e1; /* surface-container-highest */
    }
    .progress-fill {
      background-color: #45573b; /* primary / Matcha Green */
      transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
    }
    .japanese-text {
      font-family: 'Noto Sans JP', sans-serif;
    }
    /* Simple atmospheric grain for a "paper" feel */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      opacity: 0.02;
      pointer-events: none;
      background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
      z-index: 50;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md overflow-x-hidden">
<!-- Top Progress Bar Container -->
<div class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-md">
<div class="h-1 w-full progress-track">
<div class="h-full progress-fill" style="width: 45%;"></div>
</div>
<div class="flex items-center justify-between h-16 px-margin-mobile md:px-margin-desktop max-w-[1120px] mx-auto">
<button class="flex items-center text-secondary hover:text-primary transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined mr-2">close</span>
<span class="font-label-sm text-label-sm">CLOSE MODULE</span>
</button>
<div class="flex items-center space-x-unit-4">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-label-sm text-label-sm font-bold text-on-surface">12 DAY STREAK</span>
</div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="pt-32 pb-40 px-margin-mobile md:px-margin-desktop max-w-[800px] mx-auto min-h-screen flex flex-col items-center">
<!-- Title Section -->
<header class="w-full text-center mb-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
<h1 class="font-headline-md text-headline-md text-secondary mb-2">Lesson 4: Daily Activities (Vocab)</h1>
<p class="text-on-surface-variant font-body-md opacity-70">Focus on the action. Take a breath.</p>
</header>
<!-- Study Tile (The Centerpiece) -->
<section class="w-full">
<div class="washi-card rounded-xl p-12 md:p-20 text-center border border-outline-variant/30 flex flex-col items-center relative overflow-hidden group">
<!-- Decoration / Ambient Graphic -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl group-hover:bg-primary/10 transition-colors duration-500"></div>
<!-- Main Japanese Word -->
<div class="mb-8 relative">
<ruby class="japanese-text font-japanese-display text-japanese-display text-primary block leading-tight">
            食<rt class="text-body-md font-body-md text-on-surface-variant tracking-widest pb-2">た</rt>べる
          </ruby>
</div>
<!-- Meaning & Pronunciation -->
<div class="space-y-unit-2 mb-12">
<h2 class="font-display-lg text-display-lg text-on-surface">Taberu</h2>
<p class="text-headline-md font-headline-md text-secondary">To eat</p>
</div>
<!-- Breakdown Section -->
<div class="w-full max-w-md pt-8 border-t border-outline-variant">
<div class="grid grid-cols-1 gap-6 text-left">
<div class="flex items-start space-x-4">
<div class="bg-surface p-2 rounded-lg border border-outline-variant">
<span class="material-symbols-outlined text-primary">translate</span>
</div>
<div>
<span class="block font-label-sm text-label-sm text-on-surface-variant mb-1">EXAMPLE SENTENCE</span>
<p class="japanese-text text-body-lg font-body-lg text-on-surface mb-1">パンを<span class="text-primary font-bold">食べます</span></p>
<p class="text-body-md font-body-md text-secondary opacity-80">Pan o tabemasu — I eat bread.</p>
</div>
</div>
<div class="flex items-start space-x-4">
<div class="bg-surface p-2 rounded-lg border border-outline-variant">
<span class="material-symbols-outlined text-primary">architecture</span>
</div>
<div>
<span class="block font-label-sm text-label-sm text-on-surface-variant mb-1">KANJI BREAKDOWN</span>
<p class="text-body-md font-body-md text-on-surface">食 (Eat / Food) — Radical: 𩙿 (Food)</p>
</div>
</div>
</div>
</div>
<!-- Audio Button (Micro-interaction) -->
<button aria-label="Play pronunciation" class="mt-12 w-14 h-14 rounded-full bg-white border border-outline-variant flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all duration-300 active:scale-90 shadow-sm">
<span class="material-symbols-outlined">volume_up</span>
</button>
</div>
</section>
<!-- Context Image (Subtle) -->
<div class="mt-12 w-full max-w-lg overflow-hidden rounded-xl h-48 opacity-40 grayscale hover:grayscale-0 transition-all duration-700 cursor-pointer">
<div class="w-full h-full bg-cover bg-center" data-alt="A minimalist, high-key photograph of a single piece of artisanal sourdough bread on a clean, ceramic plate. The lighting is soft and natural, coming from a side window, creating gentle shadows on a light stone surface. The aesthetic is calm, quiet, and scholarly, following the Kevlingou brand's digital zendo atmosphere with high whitespace and neutral tones." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuA-Fn_4WaUNJd9BW-cDVI5j7NRaYdlHenbsrr4IcWWWWmIub47yB9MSwHb7txPRWTfKucDcPujpJ2nSNQfkRouGRkA9Itq9M4iWNt432ycv2QrHJ4_XtynRnDUFFxjvFyScKsthjLx7V6y8kltVhuWRZ2lf4Y33hqhXTbkJsIzS866C39IZgn8uyKioYk5Jfa-zArfz09GisBUq_wvOv5ePgTyOB95JJcv0NvSb02LEkc41PH6_i_MXdVFvwyjcnc41DOhRwBwIV4I')"></div>
</div>
</main>
<!-- Bottom Navigation -->
<footer class="fixed bottom-0 left-0 w-full h-24 bg-surface/90 backdrop-blur-md border-t border-outline-variant/10">
<div class="max-w-[800px] mx-auto h-full flex items-center justify-between px-margin-mobile md:px-0">
<button class="flex items-center px-6 py-3 rounded-full text-secondary hover:text-on-surface transition-all active:scale-95 font-body-md">
<span class="material-symbols-outlined mr-2">arrow_back</span>
        Previous
      </button>
<div class="flex space-x-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<button class="flex items-center px-8 py-3 rounded-full bg-primary text-on-primary hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/10 font-body-md font-bold" id="next-btn">
        Next
        <span class="material-symbols-outlined ml-2">arrow_forward</span>
</button>
</div>
</footer>
<script>
    // Micro-interaction for the Next button to simulate progress
    const nextBtn = document.getElementById('next-btn');
    const progressFill = document.querySelector('.progress-fill');
    let currentProgress = 45;

    nextBtn.addEventListener('click', () => {
      if (currentProgress < 100) {
        currentProgress += 5;
        progressFill.style.width = `${currentProgress}%`;
        
        // Subtle haptic feel on screen
        document.body.classList.add('translate-y-[-2px]');
        setTimeout(() => {
          document.body.classList.remove('translate-y-[-2px]');
        }, 100);
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextBtn.click();
      if (e.key === 'ArrowLeft') window.history.back();
    });
  </script>
</body></html>
