<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Noto+Sans+JP:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-secondary-fixed-variant": "#474743",
            "tertiary-container": "#856070",
            "surface-tint": "#516447",
            "surface-container-low": "#f6f3f2",
            "on-secondary-container": "#63635f",
            "surface-dim": "#dcd9d9",
            "surface-container-high": "#eae7e7",
            "on-primary-container": "#ddf3cd",
            "on-error-container": "#93000a",
            "primary-fixed": "#d4e9c4",
            "surface-variant": "#e4e2e1",
            "on-tertiary": "#ffffff",
            "on-tertiary-fixed": "#2d1320",
            "surface": "#fcf9f8",
            "on-surface-variant": "#444840",
            "on-primary": "#ffffff",
            "inverse-surface": "#303030",
            "on-error": "#ffffff",
            "on-primary-fixed-variant": "#3a4c30",
            "on-surface": "#1b1c1c",
            "tertiary-fixed-dim": "#e7bacc",
            "inverse-primary": "#b8cda9",
            "error": "#ba1a1a",
            "secondary-container": "#e1dfda",
            "on-secondary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "tertiary": "#6b4858",
            "error-container": "#ffdad6",
            "secondary": "#5f5e5b",
            "surface-container-highest": "#e4e2e1",
            "secondary-fixed-dim": "#c8c6c2",
            "primary-container": "#5d7052",
            "tertiary-fixed": "#ffd8e7",
            "surface-bright": "#fcf9f8",
            "primary-fixed-dim": "#b8cda9",
            "outline-variant": "#c4c8bd",
            "on-background": "#1b1c1c",
            "primary": "#45573b",
            "on-secondary-fixed": "#1b1c19",
            "background": "#fcf9f8",
            "on-tertiary-fixed-variant": "#5e3d4c",
            "outline": "#74786f",
            "on-tertiary-container": "#ffe6ee",
            "inverse-on-surface": "#f3f0f0",
            "surface-container": "#f0eded",
            "secondary-fixed": "#e4e2dd",
            "on-primary-fixed": "#0f1f09"
          },
          "borderRadius": {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
          "spacing": {
            "unit": "8px",
            "margin-mobile": "20px",
            "gutter": "24px",
            "margin-desktop": "64px",
            "container-max": "1120px"
          },
          "fontFamily": {
            "display-lg": ["Geist"],
            "japanese-display": ["Noto Sans JP"],
            "body-md": ["Geist"],
            "headline-md": ["Geist"],
            "display-lg-mobile": ["Geist"],
            "body-lg": ["Geist"],
            "label-sm": ["Geist"]
          },
          "fontSize": {
            "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
            "japanese-display": ["64px", {"lineHeight": "1.2", "fontWeight": "500"}],
            "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
            "display-lg-mobile": ["32px", {"lineHeight": "1.2", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .washi-card {
      background-color: #e1dfda; /* secondary-container / Washi */
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .washi-card:hover {
      box-shadow: 0px 4px 20px rgba(0,0,0,0.04);
    }
    .progress-track {
      background-color: #e4e2e1; /* surface-container-highest */
    }
    .progress-fill {
      background-color: #45573b; /* primary / Matcha Green */
      transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
    }
    .japanese-text {
      font-family: 'Noto Sans JP', sans-serif;
    }
    /* Simple atmospheric grain for a "paper" feel */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      opacity: 0.02;
      pointer-events: none;
      background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
      z-index: 50;
    }
  </style>
</head>
<body class="bg-background text-on-surface font-body-md text-body-md overflow-x-hidden">

<!-- Top Progress Bar & Header -->
<div class="fixed top-0 left-0 w-full z-50 bg-surface/80 backdrop-blur-md">
  <div class="h-1 w-full progress-track">
    <div class="h-full progress-fill" style="width: 45%;"></div>
  </div>
  <div class="flex items-center justify-between h-16 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto">
    <button class="flex items-center text-secondary hover:text-primary transition-colors active:scale-95 duration-200" id="close-btn">
      <span class="material-symbols-outlined mr-2">close</span>
      <span class="font-label-sm text-label-sm">CLOSE</span>
    </button>
    <div class="flex items-center space-x-unit-4">
      <span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
      <span class="font-label-sm text-label-sm font-bold text-on-surface">12 DAY STREAK</span>
    </div>
  </div>
</div>

<!-- Content Type & Level Selector -->
<div class="fixed top-16 left-0 w-full z-40 bg-surface/95 backdrop-blur border-b border-outline-variant/10 py-3 px-margin-mobile md:px-margin-desktop">
  <div class="max-w-container-max mx-auto">
    <!-- Content Type Tabs -->
    <div class="flex gap-2 mb-3 overflow-x-auto pb-2">
      <button class="content-type-tab whitespace-nowrap px-4 py-2 rounded-full text-body-md font-body-md transition-all border border-transparent active-tab" data-type="hiragana">
        ひらがな Hiragana
      </button>
      <button class="content-type-tab whitespace-nowrap px-4 py-2 rounded-full text-body-md font-body-md transition-all border border-transparent" data-type="katakana">
        カタカナ Katakana
      </button>
      <button class="content-type-tab whitespace-nowrap px-4 py-2 rounded-full text-body-md font-body-md transition-all border border-transparent" data-type="vocabulary">
        📚 Vocabulary
      </button>
      <button class="content-type-tab whitespace-nowrap px-4 py-2 rounded-full text-body-md font-body-md transition-all border border-transparent" data-type="grammar">
        📝 Grammar
      </button>
      <button class="content-type-tab whitespace-nowrap px-4 py-2 rounded-full text-body-md font-body-md transition-all border border-transparent" data-type="kanji">
        漢字 Kanji
      </button>
    </div>
    
    <!-- Level Selector -->
    <div class="flex gap-2">
      <button class="level-btn px-3 py-1 rounded-full text-label-sm font-label-sm transition-all border border-outline-variant/50 active-level" data-level="N5">
        N5
      </button>
      <button class="level-btn px-3 py-1 rounded-full text-label-sm font-label-sm transition-all border border-outline-variant/50" data-level="N4">
        N4
      </button>
      <button class="level-btn px-3 py-1 rounded-full text-label-sm font-label-sm transition-all border border-outline-variant/50" data-level="N3">
        N3
      </button>
      <button class="level-btn px-3 py-1 rounded-full text-label-sm font-label-sm transition-all border border-outline-variant/50" data-level="N2">
        N2
      </button>
    </div>
  </div>
</div>

<!-- Main Content Canvas -->
<main class="pt-40 pb-40 px-margin-mobile md:px-margin-desktop max-w-[800px] mx-auto min-h-screen flex flex-col items-center">
  
  <!-- Title Section -->
  <header class="w-full text-center mb-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
    <h1 class="font-headline-md text-headline-md text-secondary mb-2" id="lesson-title">Lesson 1: Hiragana Basics</h1>
    <p class="text-on-surface-variant font-body-md opacity-70" id="lesson-subtitle">Master the foundation. Every step matters.</p>
  </header>

  <!-- Study Tile (The Centerpiece) -->
  <section class="w-full" id="content-display">
    <div class="washi-card rounded-xl p-12 md:p-20 text-center border border-outline-variant/30 flex flex-col items-center relative overflow-hidden group">
      
      <!-- Decoration -->
      <div class="absolute -top-12 -right-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl group-hover:bg-primary/10 transition-colors duration-500"></div>

      <!-- Main Display (Dynamic) -->
      <div id="main-display" class="relative z-10 w-full">
        <!-- Content will be inserted here -->
      </div>

      <!-- Audio Button -->
      <button aria-label="Play pronunciation" class="mt-8 w-14 h-14 rounded-full bg-white border border-outline-variant flex items-center justify-center text-primary hover:bg-primary hover:text-white transition-all duration-300 active:scale-90 shadow-sm audio-btn">
        <span class="material-symbols-outlined">volume_up</span>
      </button>
    </div>
  </section>

  <!-- Kanji Analysis Section (when applicable) -->
  <section class="w-full mt-8" id="kanji-analysis-section" style="display: none;">
    <div class="washi-card rounded-xl p-8 border border-outline-variant/30">
      <h3 class="font-headline-md text-headline-md text-secondary mb-6">Kanji Analysis</h3>
      <div id="kanji-analysis-content" class="space-y-4">
        <!-- Kanji breakdown will be inserted here -->
      </div>
    </div>
  </section>

</main>

<!-- Bottom Navigation -->
<footer class="fixed bottom-0 left-0 w-full h-24 bg-surface/90 backdrop-blur-md border-t border-outline-variant/10">
  <div class="max-w-[800px] mx-auto h-full flex items-center justify-between px-margin-mobile md:px-0">
    <button class="flex items-center px-6 py-3 rounded-full text-secondary hover:text-on-surface transition-all active:scale-95 font-body-md" id="prev-btn">
      <span class="material-symbols-outlined mr-2">arrow_back</span>
      Previous
    </button>
    
    <!-- Progress Dots -->
    <div class="flex space-x-2" id="progress-dots">
      <div class="w-2 h-2 rounded-full bg-primary dot"></div>
      <div class="w-2 h-2 rounded-full bg-outline-variant dot"></div>
      <div class="w-2 h-2 rounded-full bg-outline-variant dot"></div>
      <div class="w-2 h-2 rounded-full bg-outline-variant dot"></div>
      <div class="w-2 h-2 rounded-full bg-outline-variant dot"></div>
    </div>
    
    <button class="flex items-center px-8 py-3 rounded-full bg-primary text-on-primary hover:bg-primary/90 transition-all active:scale-95 shadow-lg shadow-primary/10 font-body-md font-bold" id="next-btn">
      Next
      <span class="material-symbols-outlined ml-2">arrow_forward</span>
    </button>
  </div>
</footer>

<script>
  // ==== LEARNING MODULE STATE & DATA ====
  const state = {
    currentContentType: 'hiragana',
    currentLevel: 'N5',
    currentItemIndex: 0,
    progress: 45,
  };

  // Sample data structure for all content types
  const contentData = {
    hiragana: {
      N5: [
        { char: 'あ', romaji: 'a', meaning: 'First vowel', example: 'あいてむ (Aitemu - Item)' },
        { char: 'い', romaji: 'i', meaning: 'Second vowel', example: 'いぬ (Inu - Dog)' },
        { char: 'う', romaji: 'u', meaning: 'Third vowel', example: 'うみ (Umi - Sea)' },
        { char: 'え', romaji: 'e', meaning: 'Fourth vowel', example: 'えいが (Eiga - Movie)' },
        { char: 'お', romaji: 'o', meaning: 'Fifth vowel', example: 'おねえさん (Onesan - Sister)' },
      ],
      N4: [{ char: 'か', romaji: 'ka', meaning: 'Start of consonants', example: 'かさ (Kasa - Umbrella)' }],
      N3: [],
      N2: [],
    },
    katakana: {
      N5: [
        { char: 'ア', romaji: 'a', meaning: 'First vowel (Katakana)', example: 'アメリカ (Amerika - America)' },
        { char: 'イ', romaji: 'i', meaning: 'Second vowel (Katakana)', example: 'イギリス (Igirisu - Britain)' },
      ],
      N4: [],
      N3: [],
      N2: [],
    },
    vocabulary: {
      N5: [
        { kanji: '食べる', hiragana: 'たべる', romaji: 'taberu', meaning: 'To eat', example: 'パンを食べます (I eat bread)' },
        { kanji: '飲む', hiragana: 'のむ', romaji: 'nomu', meaning: 'To drink', example: '水を飲みます (I drink water)' },
        { kanji: '学校', hiragana: 'がっこう', romaji: 'gakkō', meaning: 'School', example: '学校に行きます (I go to school)' },
      ],
      N4: [
        { kanji: '勉強', hiragana: 'べんきょう', romaji: 'benkyō', meaning: 'Study', example: '日本語を勉強します (I study Japanese)' },
      ],
      N3: [],
      N2: [],
    },
    grammar: {
      N5: [
        { pattern: 'ます form', description: 'Polite present/future', example: '食べます (I eat / I will eat)', usage: 'Used in formal/polite speech' },
        { pattern: 'ています form', description: 'Continuous action', example: '食べています (I am eating)', usage: 'Describes ongoing action' },
      ],
      N4: [],
      N3: [],
      N2: [],
    },
    kanji: {
      N5: [
        { kanji: '食', meaning: 'eat / food', strokes: 9, radical: '𩙿 (shokuhen - food radical)', examples: ['食べる (taberu)', '食事 (shokuji)'] },
        { kanji: '学', meaning: 'study / learn', strokes: 8, radical: '子 (ko - child radical)', examples: ['学校 (gakkō)', '学生 (gakusei)'] },
        { kanji: '水', meaning: 'water', strokes: 4, radical: '水 (mizu - water radical)', examples: ['水 (mizu)', '水分 (suibun)'] },
      ],
      N4: [
        { kanji: '勉', meaning: 'diligence', strokes: 10, radical: '力 (chikara - power radical)', examples: ['勉強 (benkyō)'] },
      ],
      N3: [],
      N2: [],
    },
  };

  // ==== RENDER FUNCTIONS ====
  
  function renderHiraganaKatakana(item) {
    return `
      <div class="mb-8">
        <div class="japanese-text font-japanese-display text-japanese-display text-primary leading-tight" style="font-size: 120px;">
          ${item.char}
        </div>
      </div>
      <div class="space-y-unit-2 mb-8">
        <h2 class="font-display-lg text-display-lg text-on-surface">${item.romaji}</h2>
        <p class="text-headline-md font-headline-md text-secondary">${item.meaning}</p>
      </div>
      <div class="w-full max-w-md pt-8 border-t border-outline-variant text-left">
        <div class="flex items-start space-x-4">
          <div class="bg-surface p-2 rounded-lg border border-outline-variant flex-shrink-0">
            <span class="material-symbols-outlined text-primary">translate</span>
          </div>
          <div>
            <span class="block font-label-sm text-label-sm text-on-surface-variant mb-1">EXAMPLE</span>
            <p class="japanese-text text-body-lg font-body-lg text-on-surface">${item.example}</p>
          </div>
        </div>
      </div>
    `;
  }

  function renderVocabulary(item) {
    return `
      <div class="mb-8">
        <ruby class="japanese-text font-japanese-display text-japanese-display text-primary block leading-tight">
          ${item.kanji}<rt class="text-body-md font-body-md text-on-surface-variant tracking-widest pb-2">${item.hiragana}</rt>
        </ruby>
      </div>
      <div class="space-y-unit-2 mb-12">
        <h2 class="font-display-lg text-display-lg text-on-surface">${item.romaji}</h2>
        <p class="text-headline-md font-headline-md text-secondary">${item.meaning}</p>
      </div>
      <div class="w-full max-w-md pt-8 border-t border-outline-variant">
        <div class="space-y-6 text-left">
          <div class="flex items-start space-x-4">
            <div class="bg-surface p-2 rounded-lg border border-outline-variant flex-shrink-0">
              <span class="material-symbols-outlined text-primary">translate</span>
            </div>
            <div>
              <span class="block font-label-sm text-label-sm text-on-surface-variant mb-1">EXAMPLE SENTENCE</span>
              <p class="japanese-text text-body-lg font-body-lg text-on-surface">${item.example}</p>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderGrammar(item) {
    return `
      <div class="mb-8">
        <h2 class="font-display-lg text-display-lg text-primary">${item.pattern}</h2>
      </div>
      <div class="space-y-unit-2 mb-12">
        <p class="text-headline-md font-headline-md text-secondary">${item.description}</p>
        <p class="text-body-md font-body-md text-on-surface-variant">${item.usage}</p>
      </div>
      <div class="w-full max-w-md pt-8 border-t border-outline-variant">
        <div class="space-y-6 text-left">
          <div class="flex items-start space-x-4">
            <div class="bg-surface p-2 rounded-lg border border-outline-variant flex-shrink-0">
              <span class="material-symbols-outlined text-primary">lightbulb</span>
            </div>
            <div>
              <span class="block font-label-sm text-label-sm text-on-surface-variant mb-1">EXAMPLE</span>
              <p class="japanese-text text-body-lg font-body-lg text-on-surface">${item.example}</p>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderKanji(item) {
    return `
      <div class="mb-8">
        <div class="japanese-text font-japanese-display text-japanese-display text-primary leading-tight" style="font-size: 120px;">
          ${item.kanji}
        </div>
      </div>
      <div class="space-y-unit-2 mb-8">
        <h2 class="font-display-lg text-display-lg text-on-surface">${item.meaning}</h2>
        <p class="text-body-md font-body-md text-secondary">${item.strokes} Strokes</p>
      </div>
      <div class="w-full max-w-md pt-8 border-t border-outline-variant text-left">
        <div class="flex items-start space-x-4">
          <div class="bg-surface p-2 rounded-lg border border-outline-variant flex-shrink-0">
            <span class="material-symbols-outlined text-primary">architecture</span>
          </div>
          <div>
            <span class="block font-label-sm text-label-sm text-on-surface-variant mb-1">RADICAL</span>
            <p class="text-body-md font-body-md text-on-surface">${item.radical}</p>
          </div>
        </div>
      </div>
    `;
  }

  function renderKanjiAnalysis(item) {
    return `
      <div class="space-y-4">
        <div class="bg-surface rounded-lg p-4 border border-outline-variant">
          <h4 class="font-label-sm text-label-sm text-on-surface-variant mb-2">CHARACTER</h4>
          <div class="japanese-text text-headline-md font-headline-md text-primary">${item.kanji}</div>
        </div>
        <div class="bg-surface rounded-lg p-4 border border-outline-variant">
          <h4 class="font-label-sm text-label-sm text-on-surface-variant mb-2">MEANING</h4>
          <p class="text-body-md font-body-md text-on-surface">${item.meaning}</p>
        </div>
        <div class="bg-surface rounded-lg p-4 border border-outline-variant">
          <h4 class="font-label-sm text-label-sm text-on-surface-variant mb-2">STROKES: ${item.strokes}</h4>
          <p class="text-body-md font-body-md text-secondary">Order: Top to bottom, left to right</p>
        </div>
        <div class="bg-surface rounded-lg p-4 border border-outline-variant">
          <h4 class="font-label-sm text-label-sm text-on-surface-variant mb-2">RADICAL BREAKDOWN</h4>
          <p class="text-body-md font-body-md text-on-surface mb-3">${item.radical}</p>
          <div class="flex flex-wrap gap-2">
            ${item.examples.map(ex => `<span class="px-3 py-1 bg-primary/10 text-primary rounded-full text-body-md font-body-md">${ex}</span>`).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // ==== MAIN DISPLAY FUNCTION ====
  function displayContent() {
    const data = contentData[state.currentContentType][state.currentLevel];
    
    if (data.length === 0) {
      document.getElementById('main-display').innerHTML = `
        <div class="py-12 text-center">
          <p class="text-headline-md font-headline-md text-secondary mb-2">Content Coming Soon</p>
          <p class="text-body-md font-body-md text-on-surface-variant">This level is not yet available for ${state.currentContentType}</p>
        </div>
      `;
      document.getElementById('kanji-analysis-section').style.display = 'none';
      return;
    }

    const currentItem = data[state.currentItemIndex % data.length];
    let content = '';

    switch (state.currentContentType) {
      case 'hiragana':
      case 'katakana':
        content = renderHiraganaKatakana(currentItem);
        document.getElementById('kanji-analysis-section').style.display = 'none';
        break;
      case 'vocabulary':
        content = renderVocabulary(currentItem);
        document.getElementById('kanji-analysis-section').style.display = 'none';
        break;
      case 'grammar':
        content = renderGrammar(currentItem);
        document.getElementById('kanji-analysis-section').style.display = 'none';
        break;
      case 'kanji':
        content = renderKanji(currentItem);
        document.getElementById('kanji-analysis-section').style.display = 'block';
        document.getElementById('kanji-analysis-content').innerHTML = renderKanjiAnalysis(currentItem);
        break;
    }

    document.getElementById('main-display').innerHTML = content;
    updateTitle();
    updateProgressDots(data.length);
  }

  function updateTitle() {
    const typeLabels = {
      hiragana: 'Hiragana',
      katakana: 'Katakana',
      vocabulary: 'Vocabulary',
      grammar: 'Grammar',
      kanji: 'Kanji'
    };
    const data = contentData[state.currentContentType][state.currentLevel];
    const index = state.currentItemIndex % data.length;
    
    document.getElementById('lesson-title').textContent = `${typeLabels[state.currentContentType]} ${state.currentLevel}: Item ${index + 1}`;
    document.getElementById('lesson-subtitle').textContent = `Practicing ${typeLabels[state.currentContentType].toLowerCase()}. Stay focused.`;
  }

  function updateProgressDots(totalItems) {
    const dots = document.querySelectorAll('#progress-dots .dot');
    const maxDots = Math.min(5, totalItems);
    
    dots.forEach((dot, i) => {
      if (i < maxDots) {
        dot.style.display = 'block';
        dot.classList.toggle('bg-primary', i === (state.currentItemIndex % totalItems));
        dot.classList.toggle('bg-outline-variant', i !== (state.currentItemIndex % totalItems));
      } else {
        dot.style.display = 'none';
      }
    });
  }

  // ==== EVENT LISTENERS ====
  
  // Content Type Tabs
  document.querySelectorAll('.content-type-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.content-type-tab').forEach(t => t.classList.remove('active-tab', 'bg-primary', 'text-on-primary', 'border-primary'));
      tab.classList.add('active-tab', 'bg-primary', 'text-on-primary', 'border-primary');
      state.currentContentType = tab.dataset.type;
      state.currentItemIndex = 0;
      displayContent();
    });
  });

  // Level Buttons
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active-level', 'bg-primary', 'text-on-primary', 'border-primary'));
      btn.classList.add('active-level', 'bg-primary', 'text-on-primary', 'border-primary');
      state.currentLevel = btn.dataset.level;
      state.currentItemIndex = 0;
      displayContent();
    });
  });

  // Navigation Buttons
  document.getElementById('next-btn').addEventListener('click', () => {
    const data = contentData[state.currentContentType][state.currentLevel];
    if (data.length > 0) {
      state.currentItemIndex = (state.currentItemIndex + 1) % data.length;
      if (state.progress < 100) state.progress += 5;
      document.querySelector('.progress-fill').style.width = `${state.progress}%`;
      displayContent();
    }
  });

  document.getElementById('prev-btn').addEventListener('click', () => {
    const data = contentData[state.currentContentType][state.currentLevel];
    if (data.length > 0) {
      state.currentItemIndex = (state.currentItemIndex - 1 + data.length) % data.length;
      displayContent();
    }
  });

  // Keyboard Navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') document.getElementById('next-btn').click();
    if (e.key === 'ArrowLeft') document.getElementById('prev-btn').click();
  });

  // Close Button
  document.getElementById('close-btn').addEventListener('click', () => {
    window.history.back();
  });

  // Audio Button (Placeholder)
  document.addEventListener('click', (e) => {
    if (e.target.closest('.audio-btn')) {
      console.log('Audio playback placeholder - integrate with TTS API');
    }
  });

  // Initial Display
  displayContent();

  // Style active tabs/buttons on load
  document.querySelector('.content-type-tab[data-type="hiragana"]').classList.add('active-tab', 'bg-primary', 'text-on-primary', 'border-primary');
  document.querySelector('.level-btn[data-level="N5"]').classList.add('active-level', 'bg-primary', 'text-on-primary', 'border-primary');
</script>

<style>
  .active-tab {
    @apply bg-primary text-on-primary border-primary;
  }
  .active-level {
    @apply bg-primary text-on-primary border-primary;
  }
</style>

</body>
</html>
